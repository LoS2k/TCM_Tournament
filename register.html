<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Tank Company Cup</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="mark">TC</div>
    TANK COMPANY <span class="sub">CUP</span>
  </div>
  <div class="nav-links">
    <a class="nav-link active" href="register.html" data-i18n="nav_register">Register</a>
    <a class="nav-link" href="public.html" data-i18n="nav_tournament">Tournament</a>
    <a class="nav-link" href="admin.html" data-i18n="nav_admin">Admin</a>
  </div>
  <div class="lang-switcher" id="langSwitcher"></div>
  <div class="live-indicator">
    <span class="live-dot" id="liveDot"></span>
    <span id="liveText"></span>
  </div>
</div>

<div class="page-narrow">
  <div class="page-head">
    <div class="eyebrow" data-i18n="reg_eyebrow">Step 1 of 1</div>
    <h1 class="page-title" id="tournamentTitle">Tank Company Cup #1</h1>
    <p class="page-subtitle" id="pageSubtitle"></p>
  </div>

  <div class="card" id="registrationCard">
    <div class="card-title" id="cardTitle"></div>
    <div id="loadingNotice" class="text-sm text-muted mb-16" data-i18n="reg_loading">Connecting...</div>

    <div class="field">
      <label class="field-label" id="nameLabel"></label>
      <input type="text" id="teamName" maxlength="30">
    </div>

    <!-- Only shown in team mode -->
    <div class="field" id="playersField">
      <label class="field-label" id="playersLabel"></label>
      <textarea id="teamPlayers" rows="4"></textarea>
    </div>

    <button class="btn btn-primary btn-block" id="submitBtn" onclick="submitRegistration()"></button>

    <div class="text-sm text-muted mt-24" id="slotsInfo" style="text-align:center"></div>
  </div>

  <div class="card mt-32">
    <div class="flex-between mb-16">
      <div class="card-title" style="margin-bottom:0" id="listTitle"></div>
      <span class="badge badge-muted" id="teamCountBadge"></span>
    </div>
    <div id="teamList"></div>
  </div>
</div>

<div class="toast" id="toast"><span class="toast-dot"></span><span id="toastText"></span></div>

<script src="shared.js"></script>
<script src="i18n.js"></script>
<script>
buildLangPicker('langSwitcher');

let state = structuredClone(DEFAULT_STATE);

async function render(s) {
  state = s || await loadStateAsync();

  const isSolo = (state.mode || 'team') === 'solo';

  // Apply translations now that we know the mode
  applyTranslations();

  document.getElementById('loadingNotice').style.display = 'none';
  document.getElementById('tournamentTitle').textContent = state.tournamentName;
  document.getElementById('pageSubtitle').textContent = t('reg_subtitle');
  document.getElementById('cardTitle').textContent = t('reg_card_title');
  document.getElementById('nameLabel').textContent = t(isSolo ? 'reg_player_label_solo' : 'reg_team_name_label');
  document.getElementById('listTitle').textContent = t('reg_list_title');

  // Name input placeholder
  document.getElementById('teamName').placeholder = t('reg_team_name_placeholder');

  // Players field — hide in solo mode
  const playersField = document.getElementById('playersField');
  playersField.style.display = isSolo ? 'none' : 'block';
  if (!isSolo) {
    document.getElementById('playersLabel').textContent = t('reg_players_label');
    document.getElementById('teamPlayers').placeholder = t('reg_players_placeholder');
  }

  // Live indicator
  const liveDot = document.getElementById('liveDot');
  const liveText = document.getElementById('liveText');
  const submitBtn = document.getElementById('submitBtn');
  const isOpen = state.status === 'registration';

  liveDot.classList.toggle('on', !isOpen);
  liveText.textContent = isOpen
    ? t('hero_eyebrow_registration')
    : state.status === 'live' ? t('hero_eyebrow_live') : t('hero_eyebrow_finished');

  submitBtn.disabled = !isOpen;
  submitBtn.textContent = isOpen
    ? t(isSolo ? 'reg_submit_1v1' : 'reg_submit')
    : t('reg_closed');

  // Slots counter
  const slotsLeft = state.bracketSize - state.teams.length;
  document.getElementById('teamCountBadge').textContent =
    t(isSolo ? 'reg_count_solo' : 'reg_count', { n: state.teams.length, max: state.bracketSize });
  document.getElementById('slotsInfo').textContent = slotsLeft <= 0
    ? t('reg_slots_full')
    : t('reg_slots_free', { n: slotsLeft });

  // Team list
  const list = document.getElementById('teamList');
  if (state.teams.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">◌</div><div class="empty-state-text">${t('reg_empty')}</div></div>`;
    return;
  }
  list.innerHTML = state.teams.map((team, i) => `
    <div class="team-row">
      <div class="team-row-left">
        <div class="seed-chip">${team.seed || i + 1}</div>
        <div>
          <div class="team-name">${esc(team.name)}</div>
          ${!isSolo && team.players && team.players.length
            ? `<div class="team-players">${team.players.map(esc).join(', ')}</div>`
            : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function submitRegistration() {
  const name = document.getElementById('teamName').value.trim();
  const isSolo = (state.mode || 'team') === 'solo';
  const playersRaw = isSolo ? '' : document.getElementById('teamPlayers').value;
  const players = playersRaw.split('\n').map(p => p.trim()).filter(Boolean);

  if (!name) return showToast(t('reg_error_name'));
  if (state.status !== 'registration') return showToast(t('reg_error_closed'));
  if (state.teams.length >= state.bracketSize) return showToast(t('reg_error_full'));
  if (state.teams.find(t => t.name.toLowerCase() === name.toLowerCase()))
    return showToast(t('reg_error_exists'));

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = t('reg_loading');

  addTeam(state, name, players);
  await saveState(state);

  document.getElementById('teamName').value = '';
  if (!isSolo) document.getElementById('teamPlayers').value = '';
  showToast(t(isSolo ? 'reg_success_solo' : 'reg_success', { name }));
  submitBtn.disabled = false;
  submitBtn.textContent = t(isSolo ? 'reg_submit_1v1' : 'reg_submit');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2400);
}

window.onTcStateUpdate = render;
render();
</script>
</body>
</html>
